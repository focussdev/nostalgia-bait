<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostalgia Bait</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f12;
    --bg2:       #1a1a20;
    --bg3:       #242430;
    --border:    rgba(255,255,255,0.10);
    --border2:   rgba(255,255,255,0.18);
    --text:      #f0f0f4;
    --text2:     #ffffff;
    --text3:     #c4c4ff;
    --radius:    12px;
    --radius-sm: 8px;
    --font:      system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    overflow: hidden;
  }

  #app { width: 100%; max-width: 520px; transition: max-width 0.35s ease; position: relative; overflow: hidden; }

  .screen { display: none; }
  .screen.active { display: block; }

  @keyframes screenSlideOutLeft {
    from { transform: translateX(0);     opacity: 1; }
    to   { transform: translateX(-32px); opacity: 0; }
  }
  @keyframes screenSlideInRight {
    from { transform: translateX(32px);  opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }
  .screen.leaving {
    display: block !important;
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 0;
    animation: screenSlideOutLeft 0.22s ease forwards;
  }
  .screen.entering {
    position: relative;
    z-index: 1;
    animation: screenSlideInRight 0.22s ease forwards;
  }

  /* ── WHEEL SCREEN ── */
  #wheel-screen { text-align: center; }

  .screen-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 2rem;
  }
  .screen-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 2rem;
  }

  #wheel-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 1.75rem;
  }

  #wheel-canvas {
    display: block;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    box-shadow: 0 0 0 3px var(--bg3), 0 0 0 5px var(--border2);
  }

  /* pointer arrow pointing RIGHT into the wheel */
  #pointer {
    position: absolute;
    top: 50%;
    right: -22px;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top:    12px solid transparent;
    border-bottom: 12px solid transparent;
    border-right:  24px solid #fff;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.4));
  }

  #spin-btn {
    padding: 12px 44px;
    font-size: 16px;
    font-weight: 600;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.2s, color 0.2s;
    letter-spacing: 0.02em;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #spin-btn:hover  { background: var(--bg3); }
  #spin-btn:active { transform: scale(0.97); }
  #spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #spin-btn.veto-mode { border-color: #f4a261; color: #f4a261; }
  #spin-btn.veto-mode:hover { background: rgba(244, 163, 97, 0.151); }
  #spin-btn-sub { font-size: 10px; font-weight: 400; opacity: 0.75; letter-spacing: 0.03em; }
  #veto-pips { display: flex; gap: 7px; justify-content: center; align-items: center; min-height: 12px; }
  .veto-pip {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    background: #f4a261;
    transition: background 0.2s, border-color 0.2s;
  }
  .veto-pip.used {
    background: transparent;
    border: 1.5px solid var(--border2);
  }

  @keyframes resultColorCycle {
    0%   { color: #f0f0f4; }
    20%  { color: #ffd6a5; }
    40%  { color: #caffbf; }
    60%  { color: #bde0fe; }
    80%  { color: #e2d9f3; }
    100% { color: #f0f0f4; }
  }

  #spin-result {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    font-size: 27px;
    font-weight: 700;
    color: var(--text2);
    text-align: center;
    width: max-content;
    max-width: 1000px;
    line-height: 1.3;
    padding: 9px 16px;
    background: rgba(0,0,0,0.58);
    border-radius: var(--radius);
    animation: resultColorCycle 5s ease-in-out infinite;
    text-shadow:
      0 0 6px  rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.6),
      0 0 40px rgba(255,255,255,0.3);
  }
  #spin-result:empty { background: none; padding: 0; }

  /* ── TASK SCREEN ── */
  #task-screen { text-align: center; padding-top: 1.5rem; }

  #task-timer-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 2rem;
    flex-direction: column;
  }
  #task-timer {
    font-size: 52px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
    color: var(--text2);
    line-height: 1;
    text-shadow:
      0 0 6px  rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.6),
      0 0 40px rgba(255,255,255,0.3);
  }
  #task-timer-pause {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: var(--font);
  }
  #task-timer-pause:hover { background: var(--bg2); color: var(--text); }

  #task-item-name {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 1.5rem;
    animation: resultColorCycle 5s ease-in-out infinite;
  }

  #task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 2rem;
    text-align: left;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .task-item:hover { background: var(--bg3); border-color: var(--border2); }
  .task-item input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: #2a9d8f;
    cursor: pointer;
    flex-shrink: 0;
  }
  .task-item span { font-size: 14px; font-weight: 500; line-height: 1.4; }
  .task-item.done { opacity: 0.5; text-decoration: line-through; }

  #task-continue-btn {
    padding: 11px 36px;
    font-size: 14px;
    font-weight: 600;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-family: var(--font);
  }
  #task-continue-btn:hover:not(:disabled) { background: var(--bg3); }
  #task-continue-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── THEME ANNOUNCE SCREEN ── */
  #theme-screen { text-align: center; padding-top: 2rem; }

  .announce-item {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 1rem;
    animation: resultColorCycle 5s ease-in-out infinite;
  }

  .by-label {
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .theme-pill {
    display: inline-block;
    padding: 8px 22px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2.5rem;
    transition: background 0.08s, color 0.08s;
    min-width: 160px;
  }

  .action-btn {
    padding: 11px 36px;
    font-size: 14px;
    font-weight: 600;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .action-btn:hover { background: var(--bg3); }

  /* ── TIER LIST SCREEN ── */
  #tier-screen {
    padding-top: 0.25rem;
    flex-direction: column;
    max-height: var(--app-max-h, 700px);
    overflow: hidden;
  }
  #tier-screen.active { display: flex; }

  #tier-header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  #tier-scroll {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #tier-scroll-inner {
    padding-right: 2px;
    transform-origin: top left;
  }

  /* pending tray */
  #pending-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 6px;
  }
  #pending-tray {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 50px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 1.5px dashed var(--border2);
    background: var(--bg2);
    margin-bottom: 1rem;
  }
  #pending-tray.drag-over { border-color: #fff; background: var(--bg3); }

  /* tier rows */
  #tiers-wrap { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0.5rem; }

  .tier-row {
    display: flex;
    align-items: stretch;
    min-height: 54px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 0.5px solid var(--border);
  }

  .tier-lbl {
    width: 50px;
    min-width: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .tier-drop {
    flex: 1;
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: var(--bg2);
    min-height: 54px;
    overflow-x: auto;
    transition: background 0.12s;
  }
  .tier-drop.drag-over { background: var(--bg3); border-left: 2px solid #fff; }

  /* chips */
  .item-chip {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: grab;
    border: 0.5px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    user-select: none;
    transition: opacity 0.1s, transform 0.1s;
  }
  .item-chip:active { transform: scale(0.96); }
  .item-chip.dragging { opacity: 0.35; }
  .chip-text { display: flex; flex-direction: column; align-items: flex-start; }
  .chip-theme {
    max-width: 150px;
    word-wrap: break-word;
    font-size: 10px;
    color: var(--text3);
    font-weight: 400;
    margin-top: 2px;
  }
  .item-chip.has-img .chip-theme { color: rgba(255,255,255,0.7); }
  .item-chip.has-img { text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

  /* next spin button */
  #next-btn {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  #next-btn:hover { background: var(--bg3); }

  /* ── FINISH SCREEN ── */
  #finish-screen { padding-top: 0.5rem; }
  #finish-header { text-align: center; margin-bottom: 1.5rem; }
  #finish-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  #finish-sub { font-size: 13px; color: var(--text3); }
  #finish-tiers { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1.25rem; }
  .finish-tier-row {
    display: flex; align-items: stretch; min-height: 44px;
    border-radius: var(--radius-sm); overflow: hidden; border: 0.5px solid var(--border);
  }
  .finish-tier-lbl {
    width: 50px; min-width: 50px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .finish-tier-items {
    flex: 1; display: flex; flex-wrap: wrap; align-items: center;
    gap: 6px; padding: 8px 10px; background: var(--bg2);
  }
  #finish-actions { display: flex; gap: 8px; margin-top: 1rem; }
  #finish-actions .action-btn { flex: 1; }

  /* ── TOP MENU ── */
  #top-bar {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 500;
    display: flex;
    align-items: flex-start;
  }
  #top-menu {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 5px;
    padding: 7px 14px 10px 14px;
    background: var(--bg2);
    border-bottom-right-radius: var(--radius);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  #top-menu-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.04em;
    white-space: nowrap;
    align-self: center;
  }
  #game-status {
    padding: 7px 14px 10px;
    background: var(--bg2);
    border-bottom-right-radius: var(--radius);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 600;
    color: var(--text3);
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  #top-menu-save {
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow: hidden;
    max-height: 350px;
    opacity: 1;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1),
                opacity 0.28s ease;
  }
  #top-menu-save.collapsed {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }
  .menu-divider {
    width: 100%;
    height: 1px;
    background: var(--border2);
    flex-shrink: 0;
    margin: 2px 0;
  }
  .menu-btn {
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: var(--font);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .menu-btn:hover { background: var(--bg3); color: var(--text); }
  #resume-btn { color: var(--text); border-color: var(--border2); }

  /* ── BACKGROUND OVERLAY (item image + vignette, theme screen) ── */
  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #fff;
    color: #111;
    padding: 10px 22px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div id="app">

  <!-- ── WHEEL ── -->
  <div id="wheel-screen" class="screen active">
    <p class="screen-title">Spin The Wheel</p>
    <div id="wheel-wrap">
      <canvas id="wheel-canvas" width="480" height="480"></canvas>
      <div id="pointer"></div>
      <div id="spin-result"></div>
    </div>
    <br>
    <div style="display:inline-flex;flex-direction:column;align-items:center;gap:1rem">
      <button id="spin-btn"><span id="spin-btn-label">SPIN!</span><span id="spin-btn-sub"></span></button>
      <div id="veto-pips"></div>
      <button id="to-theme-btn" class="action-btn" style="display:none">Continue</button>
    </div>
  </div>

  <!-- ── TASK ── -->
  <div id="task-screen" class="screen">
    <div id="task-timer-wrap">
      <div id="task-timer">0:00:00</div>
      <button id="task-timer-pause">Pause</button>
    </div>
    <div id="task-item-name"></div>
    <div id="task-list"></div>
    <button id="task-continue-btn" disabled>Continue</button>
  </div>

  <!-- ── THEME ANNOUNCE ── -->
  <div id="theme-screen" class="screen">
    <p class="screen-title" style="margin-bottom:1.5rem">Rolling Theme For...</p>
    <div class="announce-item" id="announce-item"></div>
    <div class="by-label">Theme</div>
    <div class="theme-pill" id="announce-theme"></div>
    <br>
    <button class="action-btn" id="go-tier-btn">Continue</button>
  </div>

  <!-- ── TIER LIST ── -->
  <div id="tier-screen" class="screen">
    <div id="tier-header">
      <p class="screen-title">Tier List</p>
    </div>
    <div id="tier-scroll">
      <div id="tier-scroll-inner">
        <div>
          <div id="pending-label">Holding Area</div>
          <div id="pending-tray"></div>
        </div>
        <div id="tiers-wrap"></div>
      </div>
    </div>
    <button id="next-btn" style="flex-shrink:0;margin-top:1.25rem">Next Round</button>
  </div>

  <div id="finish-screen" class="screen">
    <div id="finish-header">
      <div id="finish-title">All Done!</div>
      <div id="finish-sub"></div>
    </div>
    <div id="finish-tiers"></div>
    <div id="finish-actions">
      <button id="restart-btn" class="action-btn">Play Again</button>
    </div>
  </div>

</div>

<div id="top-bar">
  <div id="top-menu">
    <span id="top-menu-title">Nostalgia Bait</span>
    <button class="menu-btn" id="hide-save-menu-btn">Show Save Menu</button>
    <div id="top-menu-save" class="collapsed">
      <span class="menu-divider"></span>
      <button class="menu-btn" id="template-link-btn">Load Template</button>
      <button class="menu-btn" id="save-link-btn">Link Save File</button>
      <button class="menu-btn" id="resume-btn" style="display:none">Resume Session</button>
      <span class="menu-divider"></span>
      <button class="menu-btn" id="reset-save-btn">Reset Save</button>
      <button class="menu-btn" id="new-game-btn">Unlink Save</button>
      <button class="menu-btn" id="reset-template-btn">Unlink Template</button>
    </div>
  </div>
  <div id="game-status"></div>
</div>

<div id="bg-overlay"></div>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  SOUNDS  (drop your files here)
// ─────────────────────────────────────────────
const SOUND_TICK  = "sounds/tick.mp3";   // wheel segment tick + theme cycle
const SOUND_LAND  = "sounds/land.mp3";   // wheel stops on item
const SOUND_THEME = "sounds/theme.mp3";  // theme reveal lands
const SOUND_PLACE = "sounds/place.mp3";  // item placed in tier

function loadSfx(src) {
  const a = new Audio(src);
  a.load();
  return a;
}

const sfxTick  = loadSfx(SOUND_TICK);
const sfxLand  = loadSfx(SOUND_LAND);
const sfxTheme = loadSfx(SOUND_THEME);
const sfxPlace = loadSfx(SOUND_PLACE);

function playSfx(sfx, volume = 0.5) {
  const clone = sfx.cloneNode();
  clone.volume = Math.min(1, Math.max(0, volume));
  clone.play().catch(() => {});
}

// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const ITEMS = [
  "Item1",
  "Item2",
  "Item3"
];

const THEMES = [
  "Theme1",
  "Theme2",
  "Theme3"
];

const TIERS = [
  { label: "S", color: "#E8564A" },
  { label: "A", color: "#F0943A" },
  { label: "B", color: "#F5C842" },
  { label: "C", color: "#5cb85c" },
  { label: "D", color: "#4E9BDB" },
  { label: "F", color: "#9B6EE0" },
];

const TASKS = [
  "Task1 (Permanent)",
  "Task2 (Permanent)",
];

// One random task is picked from this list each round (if non-empty)
const TASKS_RANDOM = [
  "Task1 (Random)",
  "Task2 (Random)",
  "Task3 (Random)",
];

// Snapshot of code defaults — used to reset when template is unlinked
const CODE_TEMPLATE = {
  id: 'default',
  name: null,
  maxRounds: 0,
  maxVetos: 3,
  items: [...ITEMS],
  themes: [...THEMES],
  tiers: TIERS.map(t => ({...t})),
  tasks: [...TASKS],
  tasksRandom: [...TASKS_RANDOM],
};

// Images: drop files named after items into this folder (e.g. "images/Pizza.jpg")
const IMAGE_FOLDER = "images";
const IMAGE_EXTS   = [".jpg", ".jpeg", ".png", ".webp", ".gif"];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let remaining    = [];   // items left to spin
let selectedItem = null;
let currentTheme = null;
let spinCount    = 0;
let placedItems  = {};   // { itemName: { tier, theme } }
let tierContents = TIERS.map(() => []); // items in each tier row
let ITEM_IMAGES         = {};   // { itemName: dataURL } — for save/future upload UI
const ITEM_IMAGE_ELEMENTS = {};  // { itemName: HTMLImageElement } — loaded from images/ folder
let wheelAngle   = 0;
let spinning     = false;
let spinVel      = 0;
let rafId        = null;
let vetosRemaining = 3; // resets to maxVetos at start of each fresh spin
let themesDeck   = []; // shuffled deck; dealt one per spin, reshuffled when empty
let timerSeconds     = 0;
let timerRunning     = false;
let timerInterval    = null;
let currentRandomTask = null;
let taskChecked      = [];
let _restoredScreen  = 'wheel-screen';
let maxRounds        = 0;
let maxVetos        = 3;
let _templateHandle  = null;
let activeTemplateId = 'default';
let tierScrollZoom   = 1;

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function scaleTierContent() {
  const container = document.getElementById('tier-scroll');
  const inner     = document.getElementById('tier-scroll-inner');
  if (!container || !inner) return;
  inner.style.zoom = '';
  const naturalH   = inner.offsetHeight;
  const availH     = container.clientHeight;
  tierScrollZoom   = (naturalH > availH && availH > 0)
    ? Math.max(0.4, availH / naturalH)
    : 1;
  inner.style.zoom = tierScrollZoom < 1 ? tierScrollZoom : '';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function randomThemeColor() {
  const palettes = [
    ["#ffd6e7","#c9184a"], ["#caffbf","#1b5e20"],
    ["#bde0fe","#023e8a"], ["#ffd6a5","#7c3e00"],
    ["#e2d9f3","#4a235a"], ["#d0f4de","#1b4332"],
  ];
  return palettes[Math.floor(Math.random() * palettes.length)];
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function showScreen(id) {
  if (id !== 'task-screen') {
    clearInterval(timerInterval);
    timerRunning = false;
  }

  // clean up any previous mid-transition leftovers
  document.querySelectorAll('.screen.leaving').forEach(s => s.classList.remove('leaving'));
  document.querySelectorAll('.screen.entering').forEach(s => s.classList.remove('entering'));

  const prev = document.querySelector('.screen.active');
  const next = document.getElementById(id);

  if (!prev || prev === next) {
    if (prev) prev.classList.remove('active');
    next.classList.add('active');
    applyZoom();
    return;
  }

  prev.classList.remove('active');
  prev.classList.add('leaving');
  next.classList.add('active', 'entering');

  applyZoom();

  setTimeout(() => {
    prev.classList.remove('leaving');
    next.classList.remove('entering');
  }, 240);
}

function resetRemaining() {
  remaining = shuffle([...ITEMS]);
}

function resetThemesDeck() {
  themesDeck = shuffle([...THEMES]);
}

async function preloadImages() {
  await Promise.all(ITEMS.map(name => new Promise(done => {
    if (ITEM_IMAGE_ELEMENTS[name]) return done();
    let i = 0;
    function tryNext() {
      if (i >= IMAGE_EXTS.length) return done();
      const img = new Image();
      img.onload  = () => { ITEM_IMAGE_ELEMENTS[name] = img; done(); };
      img.onerror = () => { i++; tryNext(); };
      img.src = `${IMAGE_FOLDER}/${name}${IMAGE_EXTS[i]}`;
    }
    tryNext();
  })));
}

function updateWheelSub() {
  const rated = Object.keys(placedItems).length;
  const total = maxRounds > 0 ? maxRounds : ITEMS.length;
  const el = document.getElementById('game-status');
  if (!el) return;
  el.innerHTML =
    `<span>Round ${spinCount + 1} / ${total}</span>` +
    `<span style="font-size:13px;font-weight:400;opacity:0.65">${rated} item${rated !== 1 ? 's' : ''} rated</span>`;
}

// ── IndexedDB helpers ──
function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('spin-tier', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('kv').objectStore('kv').get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror   = () => rej(req.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(val, key);
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  });
}

// ── Template utilities ──
function templateHash(tpl) {
  const str = JSON.stringify([tpl.items, tpl.tiers]);
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return (h >>> 0).toString(36);
}

function applyTemplate(tpl) {
  ITEMS.splice(0, Infinity, ...tpl.items);
  THEMES.splice(0, Infinity, ...tpl.themes);
  TIERS.splice(0, Infinity, ...tpl.tiers);
  TASKS.splice(0, Infinity, ...tpl.tasks);
  TASKS_RANDOM.splice(0, Infinity, ...(tpl.tasksRandom || []));
  maxRounds = tpl.maxRounds || 0;
  activeTemplateId = tpl.name || tpl.id || 'default';
  while (tierContents.length < TIERS.length) tierContents.push([]);
  while (tierContents.length > TIERS.length) tierContents.pop();
}

function resetToCodeDefaults() {
  applyTemplate(CODE_TEMPLATE);
  activeTemplateId = 'default';
}

// ── Serialise / apply ──
function getSaveData() {
  return {
    version:    2,
    templateId: activeTemplateId,
    state: {
      currentScreen:    document.querySelector('.screen.active')?.id ?? 'wheel-screen',
      selectedItem,
      currentTheme,
      timerSeconds,
      currentRandomTask,
      taskChecked:      [...taskChecked],
      placedItems:      {...placedItems},
      tierContents:     tierContents.map(row => [...row]),
      spinCount,
      vetosRemaining,
      remaining:        [...remaining],
      themesDeck:       [...themesDeck]
    }
  };
}

function applyStateFromSave(s) {
  Object.keys(placedItems).forEach(k => delete placedItems[k]);
  Object.assign(placedItems, s.placedItems);
  tierContents.splice(0, Infinity, ...s.tierContents.map(row => [...row]));
  spinCount         = s.spinCount;
  remaining         = [...s.remaining];
  themesDeck        = s.themesDeck ? [...s.themesDeck] : shuffle([...THEMES]);
  selectedItem      = s.selectedItem ?? null;
  currentTheme      = s.currentTheme ?? null;
  timerSeconds      = s.timerSeconds ?? 0;
  currentRandomTask = s.currentRandomTask ?? null;
  taskChecked       = s.taskChecked ? [...s.taskChecked] : [];
  vetosRemaining    = s.vetosRemaining ?? 1;
  const saved       = s.currentScreen ?? 'wheel-screen';
  _restoredScreen   = ['task-screen', 'finish-screen', 'wheel-screen'].includes(saved)
    ? saved : 'wheel-screen';
}

function saveMatchesTemplate(save) {
  if (!save) return true; // new/empty file — always allowed
  return save.templateId === activeTemplateId;
}

function applySave(save) {
  if (!save) return false;

  // v1 legacy: combined template + state in one file
  if (save.version === 1) {
    const legacyTpl = {
      items: save.items, themes: save.themes, tiers: save.tiers,
      tasks: CODE_TEMPLATE.tasks, tasksRandom: CODE_TEMPLATE.tasksRandom,
      maxRounds: 0,
    };
    applyTemplate({ ...legacyTpl, id: templateHash(legacyTpl) });
    applyStateFromSave(save.state);
    return true;
  }

  if (save.version !== 2) return false;
  applyStateFromSave(save.state);
  return true;
}

// ── File handles ──
let _fileHandle = null;

async function writeToHandle() {
  if (!_fileHandle) return;
  try {
    const perm = await _fileHandle.queryPermission({mode: 'readwrite'});
    if (perm !== 'granted') return;
    const w = await _fileHandle.createWritable();
    await w.write(JSON.stringify(getSaveData(), null, 2));
    await w.close();
  } catch(e) {}
}

async function autoSave() {
  if (_fileHandle) {
    await writeToHandle();
  } else {
    try { localStorage.setItem('spin-tier-save', JSON.stringify(getSaveData())); } catch(e) {}
  }
}

function updateSaveLinkBtn() {
  const btn = document.getElementById('save-link-btn');
  if (!btn) return;
  btn.textContent = _fileHandle ? `💾 ${_fileHandle.name}` : 'Link Save File';
  btn.title = _fileHandle ? 'Click to re-link save file' : '';
}

function updateTemplateLinkBtn() {
  const btn = document.getElementById('template-link-btn');
  if (!btn) return;
  btn.textContent = _templateHandle ? `📋 ${_templateHandle.name}` : 'Load Template';
  btn.title = _templateHandle ? 'Click to load a different template' : '';
}

async function clearFileHandle() {
  _fileHandle = null;
  try { await idbSet('fileHandle', null); } catch(e) {}
}

async function clearTemplateHandle() {
  _templateHandle = null;
  try { await idbSet('templateHandle', null); } catch(e) {}
}

async function tryLoadTemplateHandle() {
  if (!window.showOpenFilePicker) return false;
  try {
    _templateHandle = await idbGet('templateHandle');
    if (!_templateHandle) return false;
    const perm = await _templateHandle.queryPermission({mode: 'read'});
    if (perm === 'granted') {
      const text = await (await _templateHandle.getFile()).text();
      const tpl  = JSON.parse(text);
      tpl.id = templateHash(tpl);
      applyTemplate(tpl);
      updateTemplateLinkBtn();
      return true;
    }
    // perm === 'prompt' — keep handle for resume flow
    updateTemplateLinkBtn();
    return false;
  } catch(e) { _templateHandle = null; return false; }
}

async function tryAutoLoad() {
  // always try to restore template first
  await tryLoadTemplateHandle();

  if (window.showSaveFilePicker) {
    try {
      _fileHandle = await idbGet('fileHandle');
      if (_fileHandle) {
        const perm = await _fileHandle.queryPermission({mode: 'readwrite'});
        if (perm === 'granted') {
          try {
            const text = await (await _fileHandle.getFile()).text();
            const save = JSON.parse(text);
            if (!saveMatchesTemplate(save)) {
              await clearFileHandle();
              updateSaveLinkBtn();
              showToast('⚠ Save file is for a different template — unlinked');
              return false;
            }
            if (applySave(save)) { updateSaveLinkBtn(); return true; }
          } catch(e) {
            await clearFileHandle();
            localStorage.removeItem('spin-tier-save');
            updateSaveLinkBtn();
            return false;
          }
        } else if (perm === 'prompt') {
          document.getElementById('resume-btn').style.display = '';
          updateSaveLinkBtn();
          return false;
        }
        return false;
      }
    } catch(e) { _fileHandle = null; }
    return false;
  }

  // no File API — try localStorage
  try {
    const raw = localStorage.getItem('spin-tier-save');
    if (raw) {
      const save = JSON.parse(raw);
      if (!saveMatchesTemplate(save)) {
        localStorage.removeItem('spin-tier-save');
        showToast('⚠ Saved session is for a different template — cleared');
        return false;
      }
      if (applySave(save)) return true;
    }
  } catch(e) {}
  return false;
}

// ── Save menu toggle ──
document.getElementById('hide-save-menu-btn').addEventListener('click', () => {
  const menu   = document.getElementById('top-menu-save');
  const btn    = document.getElementById('hide-save-menu-btn');
  const hiding = !menu.classList.contains('collapsed');
  menu.classList.toggle('collapsed', hiding);
  btn.textContent = hiding ? 'Show Save Menu' : 'Hide Save Menu';
});

// ── Template button ──
document.getElementById('template-link-btn').addEventListener('click', async () => {
  if (!window.showOpenFilePicker) { showToast('File API not available'); return; }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON template', accept: {'application/json': ['.json']} }]
    });
    const text = await (await handle.getFile()).text();
    const tpl  = JSON.parse(text);
    if (!Array.isArray(tpl.items) || !tpl.items.length) { showToast('Invalid template file'); return; }
    tpl.id = templateHash(tpl);
    _templateHandle = handle;
    await idbSet('templateHandle', handle);
    applyTemplate(tpl);
    updateTemplateLinkBtn();

    // Unlink any save that doesn't belong to this template
    if (_fileHandle) {
      let saveUnlinked = false;
      try {
        const text = await (await _fileHandle.getFile()).text();
        if (text.trim()) {
          const existingSave = JSON.parse(text);
          if (!saveMatchesTemplate(existingSave)) {
            await clearFileHandle();
            updateSaveLinkBtn();
            saveUnlinked = true;
          }
        }
      } catch(e) {}
      if (saveUnlinked) {
        showToast(`Template loaded — save file was for a different template and has been unlinked`);
        // reset and exit early so we don't auto-save into the now-unlinked file
        resetGameState();
        drawWheel();
        updateWheelSub();
        return;
      }
    }

    // reset game state for the new template
    Object.keys(placedItems).forEach(k => delete placedItems[k]);
    tierContents.forEach(row => row.splice(0));
    spinCount = 0; selectedItem = null; currentTheme = null;
    resetRemaining();
    resetThemesDeck();
    drawWheel();
    updateWheelSub();
    showToast(`Template loaded: ${handle.name}`);
  } catch(e) {}
});

// ── Save file button ──
document.getElementById('save-link-btn').addEventListener('click', async () => {
  if (!window.showSaveFilePicker) { showToast('File API not available'); return; }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: 'nostalgia-bait.save.json',
      startIn: _templateHandle || 'documents',
      types: [{ description: 'JSON save', accept: {'application/json': ['.json']} }]
    });

    let existing = null;
    try {
      const text = await (await handle.getFile()).text();
      if (text.trim()) existing = JSON.parse(text);
    } catch(e) {}

    if (!saveMatchesTemplate(existing)) {
      showToast(`⚠ Save file belongs to a different template — load the correct template first`);
      return;
    }

    _fileHandle = handle;
    await idbSet('fileHandle', handle);
    if (existing) applySave(existing);
    await writeToHandle();
    updateSaveLinkBtn();
    updateTemplateLinkBtn();
    drawWheel();
    updateWheelSub();
    updateVetoPips();
    showToast('Save file linked!');
  } catch(e) { if (e.name !== 'AbortError') console.error(e); }
});

// ── Resume button ──
document.getElementById('resume-btn').addEventListener('click', async () => {
  if (!_fileHandle) return;
  try {
    if (_templateHandle) {
      try {
        const tPerm = await _templateHandle.requestPermission({mode: 'read'});
        if (tPerm === 'granted') {
          const text = await (await _templateHandle.getFile()).text();
          const tpl  = JSON.parse(text);
          tpl.id = templateHash(tpl);
          applyTemplate(tpl);
          updateTemplateLinkBtn();
        }
      } catch(e) {}
    }
    const perm = await _fileHandle.requestPermission({mode: 'readwrite'});
    if (perm === 'granted') {
      const text = await (await _fileHandle.getFile()).text();
      const save = JSON.parse(text);
      if (!saveMatchesTemplate(save)) {
        await clearFileHandle();
        updateSaveLinkBtn();
        showToast('⚠ Save file is for a different template — unlinked');
        return;
      }
      applySave(save);
      document.getElementById('resume-btn').style.display = 'none';
      drawWheel();
      updateWheelSub();
      showToast('Session resumed!');
    }
  } catch(e) {}
});

// ─────────────────────────────────────────────
//  WHEEL DRAWING
// ─────────────────────────────────────────────
const canvas = document.getElementById("wheel-canvas");
const ctx    = canvas.getContext("2d");
const CX = 240, CY = 240, R = 225;

function drawWheel() {
  const items = remaining.length > 0 ? remaining : ITEMS;
  const n   = items.length;
  const arc = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < n; i++) {
    const a0 = wheelAngle + i * arc;
    const a1 = a0 + arc;

    // slice fill
    const hue      = (i * 360) / n;
    const sliceImg = ITEM_IMAGE_ELEMENTS[items[i]];

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, a0, a1);
    ctx.closePath();

    if (sliceImg) {
      ctx.save();
      ctx.clip(); // limit to this slice

      // rotate into the slice's own coordinate system so the image spins with it
      ctx.translate(CX, CY);
      ctx.rotate(a0 + arc / 2);

      // cover: fill full slice extent — R radially, outer arc width tangentially
      const targetR = R;
      const targetT = 2 * R * Math.sin(arc / 2);
      const iw = sliceImg.naturalWidth;
      const ih = sliceImg.naturalHeight;
      const scale = Math.max(targetR / iw, targetT / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      // center image at R/2 radially so its visual midpoint sits at the slice's midpoint
      ctx.drawImage(sliceImg, -(dw - targetR) / 2, -dh / 2, dw, dh);

      // color tint overlay for slice distinction
      ctx.fillStyle = `hsla(${hue}, 70%, 32%, 0.44)`;
      ctx.fillRect(-R * 3, -R * 3, R * 6, R * 6); // large rect, clipped to slice
      ctx.restore();
    } else {
      ctx.fillStyle = `hsl(${hue}, 60%, ${i % 2 === 0 ? 52 : 44}%)`;
      ctx.fill();
    }

    // slice border (re-trace path after restore clears clip)
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, a0, a1);
    ctx.closePath();
    ctx.strokeStyle = "rgba(0,0,0,0.28)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // slice text
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(a0 + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = `${n > 12 ? 14 : 17}px ${getComputedStyle(document.body).fontFamily}`;
    ctx.shadowColor = "rgba(0,0,0,0.85)";
    ctx.shadowBlur  = sliceImg ? 7 : 3;
    ctx.fillText(items[i], R - 10, 4);
    ctx.restore();
  }

  // center hub
  ctx.beginPath();
  ctx.arc(CX, CY, 20, 0, 2 * Math.PI);
  ctx.fillStyle = "#1a1a20";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// Which item is under the pointer (pointing right, at angle = 0)
function getSelected() {
  const items = remaining.length > 0 ? remaining : ITEMS;
  const n   = items.length;
  const arc = (2 * Math.PI) / n;
  // pointer at right = 0 in canvas coords.
  // We need to find which slice contains 0.
  // slice i occupies [wheelAngle + i*arc, wheelAngle + (i+1)*arc]
  // normalise pointer position relative to wheel
  const pointer = 0;
  let normalised = ((pointer - wheelAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  let idx = Math.floor(normalised / arc) % n;
  return items[idx];
}

function applyBgOverlay(itemName) {
  const imgEl = ITEM_IMAGE_ELEMENTS[itemName];
  const bgEl  = document.getElementById("bg-overlay");
  bgEl.style.background = imgEl
    ? `radial-gradient(ellipse at center, rgba(15,15,18,0.22) 0%, rgba(15,15,18,0.94) 75%), url("${imgEl.src}") center/cover`
    : '';
  bgEl.style.opacity = imgEl ? '1' : '0';
}

// ─────────────────────────────────────────────
//  SPIN ANIMATION
// ─────────────────────────────────────────────
let lastSegItem = null;

function animateSpin() {
  spinVel    *= 0.9925;
  wheelAngle += spinVel;
  drawWheel();

  const current = getSelected();
  if (current !== lastSegItem) {
    lastSegItem = current;
    playSfx(sfxTick, 0.1);
  }

  if (spinVel > 0.0005) {
    rafId = requestAnimationFrame(animateSpin);
  } else {
    lastSegItem = null;
    spinning  = false;
    selectedItem = getSelected();
    document.getElementById("spin-result").textContent = selectedItem;
    playSfx(sfxLand, 0.35);
    document.getElementById("to-theme-btn").style.display = "";

    // launch confetti
    launchConfetti();

    // show item image as full-viewport background
    applyBgOverlay(selectedItem);

    updateSpinBtn();
    autoSave();
  }
}

function updateVetoPips() {
  const container = document.getElementById('veto-pips');
  if (!container) return;
  if (maxVetos <= 0) { container.innerHTML = ''; return; }
  container.innerHTML = '';
  for (let i = 0; i < maxVetos; i++) {
    const pip = document.createElement('span');
    pip.className = 'veto-pip' + (i < vetosRemaining ? '' : ' used');
    container.appendChild(pip);
  }
}

function updateSpinBtn() {
  const btn   = document.getElementById("spin-btn");
  const label = document.getElementById("spin-btn-label");
  const sub   = document.getElementById("spin-btn-sub");
  sub.textContent = "";
  btn.classList.add('veto-mode');
  label.textContent = "VETO";
  btn.disabled = (vetosRemaining <= 0);
  updateVetoPips();
}

document.getElementById("spin-btn").addEventListener("click", () => {
  if (spinning) return;

  const btn    = document.getElementById("spin-btn");
  const isVeto = btn.classList.contains('veto-mode');

  if (isVeto) {
    vetosRemaining--;
    updateVetoPips();
  } else {
    if (remaining.length === 0) resetRemaining();
  }

  // reset button to neutral spinning state
  btn.classList.remove('veto-mode');
  document.getElementById("spin-btn-label").textContent = "SPIN!";
  document.getElementById("spin-btn-sub").textContent   = "";

  spinning = true;
  btn.disabled = true;
  document.getElementById("spin-result").textContent = "";
  document.getElementById("to-theme-btn").style.display = "none";
  document.getElementById("bg-overlay").style.opacity = '0';

  spinVel = 0.28 + Math.random() * 0.22;
  animateSpin();
});

document.getElementById("to-theme-btn").addEventListener("click", () => {
  document.getElementById("to-theme-btn").style.display = "none";
  showTaskScreen();
});

// ─────────────────────────────────────────────
//  TASK SCREEN
// ─────────────────────────────────────────────
function formatTimer(s) {
  const h  = Math.floor(s / 3600);
  const m  = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function showTaskScreen(restoreMode = false) {
  if (!restoreMode) {
    currentRandomTask = TASKS_RANDOM.length > 0
      ? TASKS_RANDOM[Math.floor(Math.random() * TASKS_RANDOM.length)]
      : null;
    timerSeconds = 0;
    taskChecked  = [];
  }

  document.getElementById('task-item-name').textContent = selectedItem;

  const allTasks = [...TASKS, ...(currentRandomTask ? [currentRandomTask] : [])];
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  allTasks.forEach((task, i) => {
    const lbl = document.createElement('label');
    lbl.className = 'task-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = taskChecked[i] ?? false;
    if (cb.checked) lbl.classList.add('done');
    cb.addEventListener('change', () => {
      taskChecked[i] = cb.checked;
      lbl.classList.toggle('done', cb.checked);
      updateTaskContinueBtn();
      autoSave();
    });
    const span = document.createElement('span');
    span.textContent = task;
    lbl.appendChild(cb);
    lbl.appendChild(span);
    list.appendChild(lbl);
  });

  timerRunning = true;
  clearInterval(timerInterval);
  document.getElementById('task-timer').textContent = formatTimer(timerSeconds);
  document.getElementById('task-timer-pause').textContent = 'Pause';
  timerInterval = setInterval(() => {
    if (!timerRunning) return;
    timerSeconds++;
    document.getElementById('task-timer').textContent = formatTimer(timerSeconds);
    if (timerSeconds % 30 === 0) autoSave();
  }, 1000);

  updateTaskContinueBtn();
  showScreen('task-screen');
  autoSave();
}

function updateTaskContinueBtn() {
  const boxes = document.querySelectorAll('#task-list input[type=checkbox]');
  const allDone = boxes.length > 0 && [...boxes].every(cb => cb.checked);
  document.getElementById('task-continue-btn').disabled = !allDone;
}

document.getElementById('task-timer-pause').addEventListener('click', () => {
  timerRunning = !timerRunning;
  document.getElementById('task-timer').style.color = timerRunning ? '#ffffff' : '#ff0000';
  document.getElementById('task-timer').style.textShadow = timerRunning ?
    '0 0 6px rgba(255,255,255,0.9),0 0 18px rgba(255,255,255,0.6), 0 0 40px rgba(255,255,255,0.3)' :
    '0 0 6px rgba(255,0,0,0.9),0 0 18px rgba(255,0,0,0.6), 0 0 40px rgba(255,0,0,0.3)';
  document.getElementById('task-timer-pause').textContent = timerRunning ? 'Pause' : 'Resume';
});

document.getElementById('task-continue-btn').addEventListener('click', () => {
  showThemeScreen();
});

// ─────────────────────────────────────────────
//  THEME ANNOUNCE
// ─────────────────────────────────────────────
function showThemeScreen() {
  if (themesDeck.length === 0) resetThemesDeck();
  currentTheme = themesDeck.shift();

  document.getElementById("announce-item").textContent = selectedItem;

  const pill = document.getElementById("announce-theme");
  const btn  = document.getElementById("go-tier-btn");

  pill.textContent = "…";
  const [initBg, initFg] = randomThemeColor();
  pill.style.background = initBg;
  pill.style.color      = initFg;
  btn.style.visibility  = "hidden";

  showScreen("theme-screen");

  let step = 0;
  const totalSteps = 22;
  let lastTheme = null;
  // animate only from remaining undealt themes + the winning one
  const animPool = themesDeck.length > 0 ? [...themesDeck, currentTheme] : [currentTheme];

  function tick() {
    if (step < totalSteps - 1) {
      while (pill.textContent === lastTheme) {
        pill.textContent = animPool[Math.floor(Math.random() * animPool.length)];
      }
      const [bg, fg] = randomThemeColor();
      pill.style.background = bg;
      pill.style.color      = fg;
      step++;
      const progress = step / totalSteps;
      const delay = 50 + Math.pow(progress, 2) * 450;
      lastTheme = pill.textContent;
      playSfx(sfxTick, 0.1);
      setTimeout(tick, delay);
    } else {
      pill.textContent      = currentTheme;
      const [bg, fg]        = randomThemeColor();
      pill.style.background = bg;
      pill.style.color      = fg;
      playSfx(sfxTheme, 0.35);
      btn.style.visibility  = "visible";
    }
  }

  setTimeout(tick, 120);
}

document.getElementById("go-tier-btn").addEventListener("click", () => {
  buildTierScreen();
  showScreen("tier-screen");
});

// ─────────────────────────────────────────────
//  TIER LIST  (pointer-based drag — works in OBS browser source)
// ─────────────────────────────────────────────
let dragChip   = null;
let dragFromEl = null;
let dragClone  = null;
let dragOffX   = 0;
let dragOffY   = 0;

function makeChip(label, theme) {
  const c = document.createElement("div");
  c.className     = "item-chip";
  c.dataset.label = label;
  c.style.touchAction = 'none'; // required for pointer capture in CEF

  if (ITEM_IMAGE_ELEMENTS[label]) {
    const src = ITEM_IMAGE_ELEMENTS[label].src;
    c.style.background = `linear-gradient(rgba(0,0,0,0.48),rgba(0,0,0,0.48)),url("${src}") center/cover`;
    c.style.color = '#fff';
    c.classList.add('has-img');
  }

  const text = document.createElement('div');
  text.className = 'chip-text';
  const nameEl = document.createElement('span');
  nameEl.textContent = label;
  text.appendChild(nameEl);
  if (theme) {
    const themeEl = document.createElement("span");
    themeEl.className   = "chip-theme";
    themeEl.textContent = theme;
    text.appendChild(themeEl);
  }
  c.appendChild(text);

  c.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    e.preventDefault();

    dragChip   = c;
    dragFromEl = c.parentElement;

    const rect = c.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;

    // floating clone sized to match the zoomed chip
    const zoom = parseFloat(document.getElementById('app').style.zoom) || 1;
    dragClone = c.cloneNode(true);
    dragClone.style.cssText =
      `position:fixed;z-index:9999;pointer-events:none;` +
      `left:${rect.left}px;top:${rect.top}px;` +
      `width:${rect.width / zoom}px;` +
      `transform:scale(${zoom});transform-origin:top left;` +
      `opacity:0.88;box-shadow:0 6px 24px rgba(0,0,0,0.5);` +
      `transition:box-shadow 0.1s;`;
    // carry over any inline background set by makeChip
    if (c.style.background) dragClone.style.background = c.style.background;
    if (c.style.color)      dragClone.style.color      = c.style.color;
    document.body.appendChild(dragClone);

    c.classList.add('dragging');
    c.setPointerCapture(e.pointerId);
  });

  c.addEventListener('pointermove', e => {
    if (!dragClone) return;
    dragClone.style.left = (e.clientX - dragOffX) + 'px';
    dragClone.style.top  = (e.clientY - dragOffY) + 'px';

    // highlight drop zone under cursor
    dragClone.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragClone.style.visibility = '';
    document.querySelectorAll('.drag-over').forEach(d => d.classList.remove('drag-over'));
    const zone = under?.closest('.tier-drop, #pending-tray');
    if (zone) zone.classList.add('drag-over');
  });

  c.addEventListener('pointerup', e => {
    if (!dragChip) return;

    dragClone.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragClone.style.visibility = '';
    const zone = under?.closest('.tier-drop, #pending-tray');

    document.querySelectorAll('.drag-over').forEach(d => d.classList.remove('drag-over'));
    dragClone.remove();
    dragClone = null;
    dragChip.classList.remove('dragging');

    if (zone) {
      const name     = dragChip.dataset.label;
      const fromTier = dragFromEl?.dataset.tier !== undefined ? parseInt(dragFromEl.dataset.tier) : null;
      const toTier   = zone.dataset.tier        !== undefined ? parseInt(zone.dataset.tier)        : null;

      if (fromTier !== null && !isNaN(fromTier))
        tierContents[fromTier] = tierContents[fromTier].filter(x => x !== name);
      if (toTier !== null && !isNaN(toTier) && !tierContents[toTier].includes(name))
        tierContents[toTier].push(name);

      zone.appendChild(dragChip);
      playSfx(sfxPlace, 0.15);
      scaleTierContent();
    }

    dragChip   = null;
    dragFromEl = null;
  });

  c.addEventListener('pointercancel', () => {
    if (dragClone) { dragClone.remove(); dragClone = null; }
    if (dragChip)  { dragChip.classList.remove('dragging'); dragChip = null; }
    document.querySelectorAll('.drag-over').forEach(d => d.classList.remove('drag-over'));
  });

  return c;
}

function buildTierScreen() {
  // pending tray — new item chip
  const tray = document.getElementById("pending-tray");
  tray.innerHTML = "";
  tray.appendChild(makeChip(selectedItem, currentTheme));

  // tier rows
  const wrap = document.getElementById("tiers-wrap");
  wrap.innerHTML = "";

  TIERS.forEach((tier, i) => {
    const row  = document.createElement("div");
    row.className = "tier-row";

    const lbl  = document.createElement("div");
    lbl.className   = "tier-lbl";
    lbl.textContent = tier.label;
    lbl.style.background = tier.color;

    const drop = document.createElement("div");
    drop.className    = "tier-drop";
    drop.dataset.tier = i;

    // re-populate persisted chips
    tierContents[i].forEach(name => drop.appendChild(makeChip(name, placedItems[name]?.theme)));

    row.appendChild(lbl);
    row.appendChild(drop);
    wrap.appendChild(row);
  });

  // label the button so the user knows this is the last round
  const unplaced    = ITEMS.length - Object.keys(placedItems).length;
  const lastByItems = unplaced <= 1;
  const lastByRounds = maxRounds > 0 && (spinCount + 1) >= maxRounds;
  document.getElementById("next-btn").textContent = (lastByItems || lastByRounds) ? "Finish!" : "Next Round";

  scaleTierContent();
}

// ─────────────────────────────────────────────
//  NEXT SPIN
// ─────────────────────────────────────────────
document.getElementById("next-btn").addEventListener("click", () => {
  // find where the current item ended up
  const name = selectedItem;
  let foundTier = null;

  document.querySelectorAll(".tier-drop").forEach(drop => {
    const chips = [...drop.children].map(c => c.dataset.label);
    if (chips.includes(name)) foundTier = parseInt(drop.dataset.tier);
  });

  // still in pending tray?
  const pendingChips = [...document.getElementById("pending-tray").children].map(c => c.dataset.label);
  if (pendingChips.length > 0) {
    showToast("Empty the holding area!");
    return;
  }

  if (foundTier !== null) {
    placedItems[name] = { tier: foundTier, theme: currentTheme };
  }

  // remove from remaining pool
  remaining = remaining.filter(x => x !== name);
  spinCount++;

  if (remaining.length === 0) resetRemaining();

  selectedItem = null;
  currentTheme = null;
  autoSave();

  // max rounds reached or all items placed → win state
  if ((maxRounds > 0 && spinCount >= maxRounds) || Object.keys(placedItems).length === ITEMS.length) {
    showFinishScreen();
    return;
  }

  // update wheel sub-heading
  updateWheelSub();
  document.getElementById("to-theme-btn").style.display = "none";
  document.getElementById("spin-result").textContent = "";
  document.getElementById("bg-overlay").style.opacity = '0';
  const spinBtn = document.getElementById("spin-btn");
  spinBtn.disabled = false;
  spinBtn.classList.remove('veto-mode');
  document.getElementById("spin-btn-label").textContent = "SPIN!";
  document.getElementById("spin-btn-sub").textContent   = "";
  updateVetoPips();
  drawWheel();
  showScreen("wheel-screen");
});

// ─────────────────────────────────────────────
//  FINISH SCREEN
// ─────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:200;pointer-events:none';
  // match visual viewport (respects zoom)
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const colors = ['#f4a261','#e76f51','#2a9d8f','#e9c46a','#a8dadc','#c77dff','#80ffdb','#f72585'];
  const particles = Array.from({length: 100}, () => ({
    x:  Math.random() * canvas.width,
    y: -20 - Math.random() * 300,
    vx: (Math.random() - 0.5) * 4,
    vy: 1.5 + Math.random() * 3.5,
    w:  6 + Math.random() * 9,
    h:  3 + Math.random() * 5,
    rot: Math.random() * Math.PI * 2,
    rs: (Math.random() - 0.5) * 0.18,
    color: colors[Math.floor(Math.random() * colors.length)],
    alpha: 1
  }));

  let start = null;
  const DURATION = 4500;

  (function tick(ts) {
    if (!start) start = ts;
    const progress = (ts - start) / DURATION;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.06;
      p.rot += p.rs;
      if (progress > 0.55) p.alpha = Math.max(0, p.alpha - 0.014);
      if (p.alpha > 0 && p.y < canvas.height + 30) alive = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (alive) requestAnimationFrame(tick);
    else canvas.remove();
  })(0);
}

function showFinishScreen(withConfetti = true) {
  const wrap = document.getElementById('finish-tiers');
  wrap.innerHTML = '';
  TIERS.forEach((tier, i) => {
    if (!tierContents[i].length) return;
    const row = document.createElement('div');
    row.className = 'finish-tier-row';
    const lbl = document.createElement('div');
    lbl.className   = 'finish-tier-lbl';
    lbl.textContent = tier.label;
    lbl.style.background = tier.color;
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'finish-tier-items';
    tierContents[i].forEach(name => itemsDiv.appendChild(makeChip(name, placedItems[name]?.theme)));
    row.appendChild(lbl);
    row.appendChild(itemsDiv);
    wrap.appendChild(row);
  });

  const placed = Object.keys(placedItems).length;
  document.getElementById('finish-sub').textContent =
    `${placed} item${placed !== 1 ? 's' : ''} rated across ${spinCount} spins`;
  document.getElementById('bg-overlay').style.opacity = '0';
  showScreen('finish-screen');
  if (withConfetti) launchConfetti();
}

document.getElementById('restart-btn').addEventListener('click', () => {
  Object.keys(placedItems).forEach(k => delete placedItems[k]);
  tierContents.forEach(row => row.splice(0));
  spinCount    = 0;
  selectedItem = null;
  currentTheme = null;
  const spinBtn = document.getElementById("spin-btn");
  spinBtn.disabled = false;
  spinBtn.classList.remove('veto-mode');
  document.getElementById("spin-btn-label").textContent = "SPIN!";
  document.getElementById("spin-btn-sub").textContent   = "";
  updateVetoPips();
  resetRemaining();
  resetThemesDeck();
  resetGameState();
  updateWheelSub();
  autoSave();
  drawWheel();
  showScreen('wheel-screen');
});

function resetGameState() {
  Object.keys(placedItems).forEach(k => delete placedItems[k]);
  tierContents.forEach(row => row.splice(0));
  spinCount    = 0;
  vetosRemaining = maxVetos;
  selectedItem = null;
  currentTheme = null;
  document.getElementById('resume-btn').style.display = 'none';
  const spinBtn = document.getElementById('spin-btn');
  spinBtn.disabled = false;
  spinBtn.classList.remove('veto-mode');
  document.getElementById('spin-btn-label').textContent = 'SPIN!';
  document.getElementById('spin-btn-sub').textContent   = '';
  document.getElementById('spin-result').textContent    = '';
  document.getElementById('to-theme-btn').style.display = 'none';
  document.getElementById('bg-overlay').style.opacity   = '0';
  updateVetoPips();
  resetRemaining();
  resetThemesDeck();
}

document.getElementById('reset-save-btn').addEventListener('click', async () => {
  if (!confirm('Reset all progress and start fresh? Template and save file stay linked.')) return;
  resetGameState();
  autoSave();
  drawWheel();
  updateWheelSub();
  showScreen('wheel-screen');
  showToast('Save reset — ready for a new run');
});

document.getElementById('new-game-btn').addEventListener('click', async () => {
  const hasFile = !!_fileHandle;
  const msg = hasFile
    ? `Start a new game and unlink "${_fileHandle.name}"? Progress will be lost.`
    : 'Start a new game? All progress will be lost.';
  if (!confirm(msg)) return;

  if (hasFile) {
    await clearFileHandle();
    try { localStorage.removeItem('spin-tier-save'); } catch(e) {}
    updateSaveLinkBtn();
  }

  resetGameState();
  drawWheel();
  updateWheelSub();
  showScreen('wheel-screen');
  showToast(hasFile ? 'New game — save file unlinked' : 'New game started');
});

document.getElementById('reset-template-btn').addEventListener('click', async () => {
  const parts = [
    _templateHandle ? `template "${_templateHandle.name}"` : null,
    _fileHandle     ? `save "${_fileHandle.name}"` : null,
  ].filter(Boolean).join(' and ');
  const msg = parts
    ? `Unlink ${parts} and reset to code defaults? All progress will be lost.`
    : 'Reset to code defaults? All progress will be lost.';
  if (!confirm(msg)) return;

  await clearFileHandle();
  await clearTemplateHandle();
  try { localStorage.removeItem('spin-tier-save'); } catch(e) {}
  resetToCodeDefaults();
  resetGameState();
  updateSaveLinkBtn();
  updateTemplateLinkBtn();
  drawWheel();
  updateWheelSub();
  showScreen('wheel-screen');
  showToast('Reset to defaults');
});

// ─────────────────────────────────────────────
//  RESPONSIVE ZOOM
// ─────────────────────────────────────────────
function applyZoom() {
  const scale = Math.min(
    window.innerWidth  / 552,   // 520px app + ~32px body padding
    window.innerHeight / 700    // approximate natural content height
  );
  const zoom = Math.min(3, Math.max(0.4, scale));
  const app = document.getElementById('app');
  app.style.zoom = zoom;

  // tier + finish screens grow with content up to viewport edge
  const wideMode = ['tier-screen', 'finish-screen'].some(
    id => document.getElementById(id).classList.contains('active')
  );
  if (wideMode) {
    const cap = Math.floor((window.innerWidth - 32) / zoom);
    app.style.width    = 'max-content';
    app.style.minWidth = Math.min(520, cap) + 'px';
    app.style.maxWidth = cap + 'px';
  } else {
    app.style.width    = '';
    app.style.minWidth = '';
    app.style.maxWidth = '';
  }

  // available height in app CSS coords: viewport minus body padding (2rem+4rem=96px) divided by zoom
  const appMaxH = Math.floor((window.innerHeight - 96) / zoom);
  document.documentElement.style.setProperty('--app-max-h', `${appMaxH}px`);

  if (document.getElementById('tier-screen').classList.contains('active')) scaleTierContent();
}
applyZoom();
window.addEventListener('resize', applyZoom);

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
(async () => {
  const loaded = await tryAutoLoad();
  if (!loaded) { resetRemaining(); resetThemesDeck(); }
  await preloadImages();
  updateWheelSub();
  drawWheel();
  updateSaveLinkBtn();
  updateTemplateLinkBtn();
  updateVetoPips();
  if (loaded) {
    if (_restoredScreen === 'task-screen') {
      if (selectedItem) applyBgOverlay(selectedItem);
      showTaskScreen(true);
    } else if (_restoredScreen === 'finish-screen') {
      showFinishScreen(false);
    } else if (_restoredScreen === 'wheel-screen' && selectedItem) {
      document.getElementById('spin-result').textContent = selectedItem;
      document.getElementById('to-theme-btn').style.display = '';
      applyBgOverlay(selectedItem);
      updateSpinBtn();
    }
  }
})();
</script>
